<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Monitor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'SF Pro', 'Helvetica Neue', sans-serif; background: #0d1117; color: #c9d1d9; height: 100vh; display: flex; flex-direction: column; }
  header { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  header h1 { font-size: 18px; font-weight: 600; color: #f0f6fc; }
  .bot-select { background: #0d1117; border: 1px solid #30363d; color: #58a6ff; padding: 4px 8px; border-radius: 6px; font-size: 13px; cursor: pointer; outline: none; font-weight: 600; }
  .bot-select:focus { border-color: #58a6ff; }
  .bot-select option { background: #161b22; color: #c9d1d9; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #f85149; flex-shrink: 0; }
  .status-dot.connected { background: #3fb950; }
  .status-text { font-size: 13px; color: #8b949e; }
  .tabs { display: flex; gap: 0; margin-left: auto; }
  .tab { padding: 6px 16px; font-size: 13px; background: transparent; border: 1px solid #30363d; color: #8b949e; cursor: pointer; transition: all 0.15s; }
  .tab:first-child { border-radius: 6px 0 0 6px; }
  .tab:last-child { border-radius: 0 6px 6px 0; }
  .tab.active { background: #21262d; color: #f0f6fc; border-color: #58a6ff; }
  .toolbar { background: #161b22; border-bottom: 1px solid #30363d; padding: 8px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .toolbar input { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 5px 10px; border-radius: 6px; font-size: 13px; width: 240px; outline: none; }
  .toolbar input:focus { border-color: #58a6ff; }
  .toolbar label { font-size: 13px; color: #8b949e; display: flex; align-items: center; gap: 4px; cursor: pointer; }
  .toolbar button { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 5px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; }
  .toolbar button:hover { background: #30363d; }
  .btn-danger { border-color: #f85149 !important; color: #f85149 !important; }
  .content { flex: 1; overflow: hidden; position: relative; }
  .panel { position: absolute; inset: 0; overflow-y: auto; padding: 12px 20px; display: none; }
  .panel.active { display: block; }

  .log-line { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12.5px; line-height: 1.7; padding: 2px 8px; border-radius: 3px; white-space: pre-wrap; word-break: break-all; }
  .log-line:hover { background: #161b22; }
  .log-time { color: #484f58; margin-right: 8px; }
  .log-sub { color: #58a6ff; margin-right: 8px; font-weight: 500; }
  .log-msg { color: #c9d1d9; }
  .log-line.type-error .log-msg { color: #f85149; }
  .log-line.type-message_in .log-msg, .log-line.type-message_content .log-msg, .log-line.type-group_message_content .log-msg { color: #3fb950; }
  .log-line.type-task_start .log-msg { color: #d29922; }
  .log-line.type-task_end .log-msg { color: #a371f7; }
  .log-line.type-startup .log-msg { color: #58a6ff; font-weight: 500; }
  .log-line.filtered { display: none; }

  .user-list { max-width: 600px; margin: 0 auto; padding: 16px 0; }
  .user-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 14px 18px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 14px; }
  .user-card:hover { border-color: #58a6ff; background: #1c2129; }
  .user-card:active { transform: scale(0.99); }
  .user-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; color: #fff; flex-shrink: 0; }
  .user-info { flex: 1; min-width: 0; }
  .user-info-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .user-card-name { font-size: 15px; font-weight: 600; color: #f0f6fc; }
  .user-card-time { font-size: 11px; color: #484f58; flex-shrink: 0; }
  .user-card-preview { font-size: 13px; color: #8b949e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-card-badge { background: #1f6feb; color: #fff; font-size: 11px; min-width: 20px; height: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; padding: 0 6px; flex-shrink: 0; }
  .user-card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }

  .chat-header { background: #161b22; border-bottom: 1px solid #30363d; padding: 10px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .chat-back { background: none; border: none; color: #58a6ff; font-size: 14px; cursor: pointer; padding: 4px 8px; border-radius: 6px; display: flex; align-items: center; gap: 4px; }
  .chat-back:hover { background: #21262d; }
  .chat-detail-name { font-size: 16px; font-weight: 600; color: #f0f6fc; }
  .chat-detail-sub { font-size: 12px; color: #484f58; margin-left: 8px; }
  .chat-refresh { background: none; border: 1px solid #30363d; color: #8b949e; font-size: 12px; cursor: pointer; padding: 4px 10px; border-radius: 6px; margin-left: auto; }
  .chat-refresh:hover { background: #21262d; color: #c9d1d9; }

  .chat-detail { max-width: 700px; margin: 0 auto; padding: 20px 0; }
  .chat-bubble { margin-bottom: 14px; display: flex; flex-direction: column; }
  .chat-bubble.user { align-items: flex-end; }
  .chat-bubble.diana { align-items: flex-start; }
  .chat-meta { font-size: 11px; color: #484f58; margin-bottom: 4px; padding: 0 4px; }
  .chat-msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; word-break: break-word; white-space: pre-wrap; }
  .chat-bubble.user .chat-msg { background: #1f6feb; color: #fff; border-bottom-right-radius: 4px; }
  .chat-bubble.diana .chat-msg { background: #21262d; color: #c9d1d9; border-bottom-left-radius: 4px; }
  .chat-loading { text-align: center; padding: 40px; color: #484f58; }
  .chat-load-more { text-align: center; padding: 12px; color: #484f58; font-size: 13px; }
  .chat-load-more.loading { color: #58a6ff; }
  .chat-error { text-align: center; padding: 40px; color: #f85149; }

  .task-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; }
  .task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .task-user { font-weight: 600; color: #58a6ff; font-size: 14px; }
  .task-time { color: #484f58; font-size: 12px; }
  .task-message { color: #c9d1d9; font-size: 13px; margin-bottom: 8px; padding: 8px 10px; background: #0d1117; border-radius: 4px; }
  .task-status { font-size: 12px; padding: 2px 8px; border-radius: 10px; display: inline-block; }
  .task-status.processing { background: #d29922; color: #0d1117; }
  .task-status.success { background: #238636; color: #fff; }
  .task-status.failed { background: #da3633; color: #fff; }
  .task-status.rate_limit { background: #9e6a03; color: #fff; }

  .empty-state { text-align: center; padding: 80px 20px; color: #484f58; font-size: 15px; }
  .counter { background: #30363d; color: #c9d1d9; font-size: 11px; padding: 1px 6px; border-radius: 10px; margin-left: 6px; }

  @media (max-width: 600px) {
    header { padding: 10px 12px; flex-wrap: wrap; }
    .tabs { margin-left: 0; margin-top: 8px; width: 100%; }
    .tab { flex: 1; text-align: center; }
    .toolbar { padding: 8px 12px; flex-wrap: wrap; }
    .toolbar input { width: 100%; }
    .panel { padding: 8px 12px; }
    .chat-msg { max-width: 92%; }
    .user-card { padding: 12px 14px; }
  }

  .skills-grid { max-width: 800px; margin: 0 auto; padding: 16px 0; }
  .skill-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 16px 20px; margin-bottom: 10px; transition: all 0.15s; }
  .skill-card:hover { border-color: #58a6ff; background: #1c2129; }
  .skill-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .skill-card-emoji { font-size: 24px; }
  .skill-card-name { font-size: 16px; font-weight: 600; color: #f0f6fc; }
  .skill-card-desc { font-size: 13px; color: #8b949e; line-height: 1.5; margin-bottom: 10px; }
  .skill-card-meta { display: flex; align-items: center; gap: 12px; font-size: 12px; color: #484f58; flex-wrap: wrap; }
  .skill-card-actions { display: flex; gap: 8px; margin-left: auto; }
  .skill-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
  .skill-btn:hover { background: #30363d; color: #f0f6fc; }
  .skill-btn.primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  .skill-btn.primary:hover { background: #388bfd; }
  .skill-file-list { font-size: 12px; color: #484f58; margin-top: 8px; padding: 8px 12px; background: #0d1117; border-radius: 6px; }
  .skill-file-item { display: flex; justify-content: space-between; padding: 2px 0; }
  .skill-file-name { color: #8b949e; }
  .skill-file-size { color: #484f58; }
  .skill-detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: center; justify-content: center; }
  .skill-detail-modal { background: #161b22; border: 1px solid #30363d; border-radius: 12px; max-width: 700px; width: 90%; max-height: 80vh; overflow-y: auto; padding: 24px; }
  .skill-detail-modal pre { background: #0d1117; padding: 16px; border-radius: 8px; font-size: 13px; line-height: 1.6; color: #c9d1d9; white-space: pre-wrap; word-break: break-word; overflow-x: auto; }
  .skill-detail-close { float: right; background: none; border: none; color: #8b949e; font-size: 20px; cursor: pointer; padding: 4px 8px; }
  .skill-detail-close:hover { color: #f0f6fc; }

  .user-card.group-card { border-left: 3px solid #3fb950; }
  .user-card.group-card .user-avatar { border-radius: 8px; }
  .group-tag { font-size: 10px; background: #238636; color: #fff; padding: 1px 6px; border-radius: 4px; margin-left: 6px; }
  .chat-bubble .group-sender { font-size: 12px; color: #58a6ff; font-weight: 500; margin-bottom: 2px; }

  .stop-btn { background: transparent; border: 1px solid #f85149; color: #f85149; padding: 5px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; margin-left: 12px; }
  .stop-btn:hover { background: #f85149; color: #fff; }
  .stop-btn:active { transform: scale(0.97); }
  .stop-btn.stopping { opacity: 0.6; cursor: not-allowed; }
  .stop-confirm { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: flex; align-items: center; justify-content: center; }
  .stop-confirm-box { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px; max-width: 400px; width: 90%; text-align: center; }
  .stop-confirm-title { font-size: 16px; font-weight: 600; color: #f0f6fc; margin-bottom: 8px; }
  .stop-confirm-desc { font-size: 13px; color: #8b949e; margin-bottom: 20px; line-height: 1.5; }
  .stop-confirm-actions { display: flex; gap: 10px; justify-content: center; }
  .stop-confirm-actions button { padding: 8px 20px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid #30363d; }
  .stop-confirm-cancel { background: #21262d; color: #c9d1d9; }
  .stop-confirm-cancel:hover { background: #30363d; }
  .stop-confirm-ok { background: #da3633; border-color: #da3633; color: #fff; }
  .stop-confirm-ok:hover { background: #f85149; }
  .stop-result { margin-top: 16px; font-size: 12px; color: #8b949e; padding: 10px; background: #0d1117; border-radius: 6px; text-align: left; max-height: 120px; overflow-y: auto; }



  .task-group-section { max-width: 900px; margin: 0 auto 24px; }
  .task-group-title { font-size: 14px; font-weight: 600; color: #f0f6fc; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .task-group-title .tg-badge { background: #1f6feb; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .task-group-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; margin-bottom: 10px; overflow: hidden; transition: border-color 0.15s; }
  .task-group-card:hover { border-color: #58a6ff; }
  .task-group-header { padding: 14px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
  .task-group-header:hover { background: #1c2129; }
  .tg-expand { color: #484f58; font-size: 12px; transition: transform 0.2s; flex-shrink: 0; }
  .tg-expand.open { transform: rotate(90deg); }
  .tg-msg { flex: 1; min-width: 0; font-size: 13px; color: #c9d1d9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tg-stats { display: flex; gap: 16px; flex-shrink: 0; font-size: 12px; }
  .tg-stat { display: flex; flex-direction: column; align-items: center; }
  .tg-stat-val { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: #f0f6fc; }
  .tg-stat-label { color: #484f58; font-size: 10px; margin-top: 1px; }
  .tg-user { color: #d29922; font-size: 12px; flex-shrink: 0; }
  .tg-runs { display: none; border-top: 1px solid #21262d; }
  .tg-runs.open { display: block; }
  .tg-run-table { width: 100%; font-size: 12px; border-collapse: collapse; }
  .tg-run-table th { text-align: left; padding: 6px 16px; color: #484f58; font-weight: 500; background: #0d1117; }
  .tg-run-table td { padding: 5px 16px; color: #8b949e; border-bottom: 1px solid #161b22; }
  .tg-run-table td.num { text-align: right; font-family: 'JetBrains Mono', monospace; }
  .tg-run-table tr:hover td { background: #0d1117; }
  .tg-avg { background: #0d1117; padding: 8px 16px; font-size: 12px; color: #8b949e; display: flex; gap: 20px; flex-wrap: wrap; }
  .tg-avg span { color: #58a6ff; }

  .token-overview { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; max-width: 900px; margin: 0 auto 20px; }
  .token-stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 16px; text-align: center; }
  .token-stat-value { font-size: 24px; font-weight: 700; color: #f0f6fc; margin-bottom: 4px; }
  .token-stat-label { font-size: 12px; color: #8b949e; }
  .token-stat-card.highlight { border-color: #58a6ff; }
  .token-chart { max-width: 900px; margin: 0 auto 24px; background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; }
  .token-chart-title { font-size: 14px; font-weight: 600; color: #f0f6fc; margin-bottom: 16px; }
  .token-bars { display: flex; align-items: flex-end; gap: 4px; height: 160px; padding-bottom: 24px; position: relative; }
  .token-bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 0; position: relative; height: 100%; justify-content: flex-end; }
  .token-bar { width: 100%; max-width: 32px; border-radius: 4px 4px 0 0; transition: all 0.3s; cursor: pointer; position: relative; min-height: 2px; }
  .token-bar:hover { opacity: 0.8; }
  .token-bar.input { background: #58a6ff; }
  .token-bar.output { background: #3fb950; }
  .token-bar-date { font-size: 9px; color: #484f58; margin-top: 4px; white-space: nowrap; position: absolute; bottom: -20px; transform: rotate(-30deg); transform-origin: top left; }
  .token-bar-tooltip { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #30363d; color: #f0f6fc; padding: 6px 10px; border-radius: 6px; font-size: 11px; white-space: nowrap; z-index: 10; pointer-events: none; margin-bottom: 4px; }
  .token-bar-group:hover .token-bar-tooltip { display: block; }
  /* Custom message tooltip */
  .msg-tooltip { position: fixed; z-index: 9999; background: #1c2128; color: #e6edf3; border: 1px solid #444c56; border-radius: 8px; padding: 10px 14px; font-size: 13px; line-height: 1.5; max-width: 480px; min-width: 120px; word-wrap: break-word; white-space: pre-wrap; box-shadow: 0 4px 16px rgba(0,0,0,.4); pointer-events: none; opacity: 0; transition: opacity 0.15s ease; }
  .msg-tooltip.visible { opacity: 1; }
  .token-legend { display: flex; gap: 16px; margin-bottom: 12px; }
  .token-legend-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #8b949e; }
  .token-legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  .token-detail { max-width: 900px; margin: 0 auto; }
  .token-detail-title { font-size: 14px; font-weight: 600; color: #f0f6fc; margin-bottom: 12px; }
  .token-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .token-table th { text-align: left; padding: 8px 10px; color: #8b949e; border-bottom: 1px solid #30363d; font-weight: 500; position: sticky; top: 0; background: #0d1117; }
  .token-table td { padding: 7px 10px; border-bottom: 1px solid #21262d; color: #c9d1d9; }
  .token-table tr:hover td { background: #161b22; }
  .token-table .date-cell { color: #58a6ff; font-weight: 500; white-space: nowrap; }
  .token-table .user-cell { color: #d29922; }
  .token-table .msg-cell { color: #8b949e; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .token-table .num-cell { text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .token-table .model-cell { color: #a371f7; font-size: 11px; }
  .token-toolbar { max-width: 900px; margin: 0 auto 16px; display: flex; gap: 10px; align-items: center; }
  .token-toolbar select, .token-toolbar input { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 5px 10px; border-radius: 6px; font-size: 13px; outline: none; }
  .token-toolbar select:focus, .token-toolbar input:focus { border-color: #58a6ff; }
  .token-toolbar label { font-size: 13px; color: #8b949e; }
  .token-loading { text-align: center; padding: 60px; color: #484f58; font-size: 14px; }

  .log-cn { color: #6e7681; font-size: 11px; margin-left: 8px; font-style: italic; font-family: -apple-system, sans-serif; }
  .log-line.type-error .log-cn { color: #f8514980; }
  .log-line.type-message_in .log-cn, .log-line.type-message_content .log-cn, .log-line.type-group_message_content .log-cn { color: #3fb95080; }
  .log-line.type-task_start .log-cn { color: #d2992280; }
  .log-line.type-startup .log-cn { color: #58a6ff80; }
</style>
</head>
<body>
<header>
  <h1 id="headerTitle">Monitor</h1>
  <select class="bot-select" id="botSelect"></select>
  <div class="status-dot" id="statusDot"></div>
  <span class="status-text" id="statusText">connecting...</span>
  <button class="stop-btn" id="stopAllBtn" title="停止所有正在执行的任务">Stop All</button>
  <div class="tabs">
    <div class="tab active" data-tab="chat">Chat</div>
    <div class="tab" data-tab="tasks">Tasks<span class="counter" id="taskCount">0</span></div>
    <div class="tab" data-tab="logs">Logs<span class="counter" id="logCount">0</span></div>
    <div class="tab" data-tab="skills">Skills</div>
    <div class="tab" data-tab="tokens">Tokens</div>
  </div>
</header>
<div class="chat-header" id="chatDetailHeader" style="display:none">
  <button class="chat-back" id="chatBackBtn">← 返回</button>
  <span class="chat-detail-name" id="chatDetailName"></span>
  <span class="chat-detail-sub" id="chatDetailSub"></span>
  <button class="chat-refresh" id="chatRefreshBtn">刷新</button>
</div>
<div class="toolbar" id="logToolbar" style="display:none">
  <input type="date" id="logDateInput" style="width:140px">
  <button id="loadLogsBtn">加载</button>
  <span id="logInfo" style="font-size:12px;color:#8b949e"></span>
  <span style="flex:1"></span>
  <input type="text" id="searchInput" placeholder="搜索日志..." style="width:180px">
  <label><input type="checkbox" id="autoScroll" checked> 自动滚动</label>
  <button id="pauseBtn">Pause</button>
</div>
<div class="content">
  <div class="panel active" id="chatPanel">
    <div class="user-list" id="userListContainer">
      <div class="empty-state" id="chatEmpty">加载中...</div>
    </div>
    <div class="chat-detail" id="chatDetailContainer" style="display:none"></div>
  </div>
  <div class="panel" id="tasksPanel"><div class="empty-state">等待任务...</div></div>
  <div class="panel" id="logsPanel"></div>
  <div class="panel" id="skillsPanel"><div class="empty-state">加载中...</div></div>
  <div class="panel" id="tokensPanel"><div class="token-loading">加载中...</div></div>
</div>

<script>
const token = new URLSearchParams(location.search).get('token');
const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
let currentBot = new URLSearchParams(location.search).get('bot') || 'diana';
function botParam() { return `&bot=${currentBot}`; }
function wsUrl() { return `${wsProto}://${location.host}/ws?token=${token}&bot=${currentBot}`; }

// Bot 切换初始化
const botSelect = document.getElementById('botSelect');
fetch(`/api/bots?token=${token}`).then(r => r.json()).then(d => {
  if (d.ok && d.bots) {

function getAvatarColor(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) & 0x7fffffff;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}

function getInitial(name) {
  if (!name) return '?';
  const ch = name.charAt(0);
  if (/[\u4e00-\u9fff]/.test(ch)) return ch;
  return ch.toUpperCase();
}

const groupNameCache = {};

function rcKey() { return `monitor_readCounts_${currentBot}`; }
let readCounts = JSON.parse(localStorage.getItem(rcKey()) || '{}');
function getUnread(userId, total) {
  return Math.max(0, total - (readCounts[userId] || 0));
}
function markRead(userId, total) {
  readCounts[userId] = total;
  localStorage.setItem(rcKey(), JSON.stringify(readCounts));
}

async function loadNames() {
  try {
    const res = await fetch(`/api/names?token=${token}${botParam()}`);
    if (!res.ok) return;
    Object.assign(nameCache, await res.json());
  } catch {}
  try {
    const res = await fetch(`/api/group-names?token=${token}${botParam()}`);
    if (!res.ok) return;
    Object.assign(groupNameCache, await res.json());
  } catch {}
}

function displayName(userId, userName) {
  if (userName && !userName.startsWith('ou_')) return userName;
  if (nameCache[userId]) return nameCache[userId];
  return userId ? userId.substring(0, 10) + '...' : '?';
}

function ensureUserSummary(userId, userName) {
  if (!userSummary[userId]) {
    userSummary[userId] = { name: displayName(userId, userName), lastText: '', lastTime: null, msgCount: 0 };
  } else if (userName) {
    const resolved = displayName(userId, userName);
    if (resolved !== userSummary[userId].name) userSummary[userId].name = resolved;
  }
  return userSummary[userId];
}

// --- Load history for user list ---
async function loadHistory() {
  await loadNames();
  try {
    const res = await fetch(`/api/history?token=${token}${botParam()}`);
    if (!res.ok) throw new Error('fail');
    const data = await res.json();
    for (const evt of (data.events || [])) {
      if (evt.kind === 'user_msg' && evt.userId) {
        const u = ensureUserSummary(evt.userId, evt.userName);
        u.lastText = evt.text;
        u.lastTime = evt.time;
        u.msgCount++;
      } else if (evt.kind === 'diana_status' && evt.userId) {
        const u = ensureUserSummary(evt.userId, evt.userName);
        u.lastTime = evt.time;
      }
    }
  } catch {}
  // Fill in users from chatIds that may have been pruned from history
  try {
    const chatRes = await fetch('/api/chats?token=' + token + botParam());
    if (chatRes.ok) {
      const chatIds = await chatRes.json();
      for (const uid of Object.keys(chatIds)) {
        if (uid.startsWith('group:')) {
          if (!userSummary[uid]) {
            const gid = uid.replace('group:', '');
            const gName = groupNameCache[gid] || gid.substring(0, 12);
            ensureUserSummary(uid, gName);
          }
        } else {
          if (!userSummary[uid]) {
            const name = nameCache[uid] || uid.substring(0, 12);
            ensureUserSummary(uid, name);
          }
        }
      }
    }
  } catch {}
  renderUserList();
  loadTasksFromHistory();
}

function loadTasksFromHistory() {
  const events = [];
  for (const [, u] of Object.entries(userSummary)) {
    // userSummary doesn't have full events, use history API
  }
  fetch(`/api/history?token=${token}${botParam()}`).then(r => r.json()).then(data => {
    if (!data.events) return;
    let pendingUserId = null;
    let pendingUserName = null;
    for (const evt of data.events) {
      if (evt.kind === 'user_msg' && evt.userId) {
        const tid = taskDedup(evt.userId, evt.text, evt.time);
        if (!tasks.has(tid)) {
          tasks.set(tid, { userId: evt.userId, userName: displayName(evt.userId, evt.userName), text: evt.text, time: evt.time, status: 'processing', error: null });
        }
        pendingUserId = evt.userId;
        pendingUserName = evt.userName;
        lastTaskId = tid;
      } else if (evt.kind === 'diana_status' && lastTaskId && tasks.has(lastTaskId)) {
        const task = tasks.get(lastTaskId);
        if (evt.status === 'replied') task.status = 'success';
        else if (evt.status === 'failed') { task.status = 'failed'; task.error = evt.error || ''; }
        else if (evt.status === 'rate_limit') { task.status = 'rate_limit'; task.error = evt.error || ''; }
        else if (evt.status === 'overflow') { task.status = 'failed'; task.error = 'Context overflow'; }
        else if (evt.status === 'no_reply') task.status = 'failed';
        tasks.set(lastTaskId, task);
        lastTaskId = null;
      }
    }
    renderTasks();
  }).catch(() => {});
}

// --- User list ---
function renderUserList() {
  const users = Object.entries(userSummary)
    .map(([id, u]) => ({ id, ...u }))
    .sort((a, b) => {
      if (!a.lastTime) return 1;
      if (!b.lastTime) return -1;
      return new Date(b.lastTime) - new Date(a.lastTime);
    });

  if (users.length === 0) {
    userListContainer.innerHTML = '<div class="empty-state">暂无聊天记录，等待用户发消息...</div>';
    return;
  }

  userListContainer.innerHTML = users.map(u => {
    const isGroup = u.id.startsWith('group:');
    const cardClass = isGroup ? 'user-card group-card' : 'user-card';
    const avatarStyle = isGroup ? 'border-radius:8px;' : '';
    const icon = isGroup ? '群' : getInitial(u.name);
    const tag = isGroup ? '<span class="group-tag">群聊</span>' : '';
    return `<div class="${cardClass}" data-uid="${escHtml(u.id)}">
      <div class="user-avatar" style="background:${getAvatarColor(u.id)};${avatarStyle}">${icon}</div>
      <div class="user-info">
        <div class="user-info-top">
          <span class="user-card-name">${escHtml(u.name)}${tag}</span>
          <span class="user-card-time">${u.lastTime ? formatDate(u.lastTime) : ''}</span>
        </div>
        <div class="user-card-preview">${escHtml((u.lastText || '').substring(0, 50))}</div>
      </div>
      <div class="user-card-right">
        ${getUnread(u.id, u.msgCount) > 0 ? '<span class="user-card-badge">' + getUnread(u.id, u.msgCount) + '</span>' : ''}
      </div>
    </div>`;
  }).join('');

  userListContainer.querySelectorAll('.user-card').forEach(card => {
    card.addEventListener('click', () => openUserChat(card.dataset.uid));
  });
}

// --- Chat detail: fetch from Feishu API ---
async function openUserChat(userId) {
  currentViewUser = userId;
  const u = userSummary[userId];
  if (u) markRead(userId, u.msgCount);
  const name = u ? u.name : userId.substring(0, 10);
  const isGroup = userId.startsWith('group:');

  chatDetailName.textContent = name;
  chatDetailSub.textContent = isGroup ? '群聊' : '';
  chatDetailHeader.style.display = 'flex';
  userListContainer.style.display = 'none';
  chatDetailContainer.style.display = 'block';
  chatDetailContainer.innerHTML = '<div class="chat-loading">加载聊天记录中...</div>';

  await loadChatDetail(userId, name);
}

async function loadChatDetail(userId, name) {
  chatPageToken = null;
  chatHasMore = false;
  chatLoadingMore = false;
  try {
    const isGroup = userId.startsWith('group:');
    const chatParam = isGroup ? `chatId=${encodeURIComponent(userId.replace('group:', ''))}` : `userId=${encodeURIComponent(userId)}`;
    const res = await fetch(`/api/chat-messages?token=${token}${botParam()}&${chatParam}&limit=50`);
    const data = await res.json();

    if (!data.ok) {
      chatDetailContainer.innerHTML = `<div class="chat-error">无法加载聊天记录: ${escHtml(data.error || '未知错误')}<br><br><span style="color:#484f58;font-size:13px">可能需要在飞书开放平台添加 <code>im:message</code> 权限</span></div>`;
      chatDetailSub.textContent = '加载失败';
      return;
    }

    const msgs = data.messages || [];
    chatDetailContainer.innerHTML = '';
    chatPageToken = data.page_token;
    chatHasMore = data.has_more;

    if (msgs.length === 0) {
      chatDetailContainer.innerHTML = '<div class="empty-state">暂无消息记录</div>';
      chatDetailSub.textContent = '0 条消息';
      return;
    }

    if (chatHasMore) {
      const hint = document.createElement('div');
      hint.className = 'chat-load-more';
      hint.id = 'chatLoadMore';
      hint.textContent = '↑ 上滑加载更早消息';
      chatDetailContainer.appendChild(hint);
    }

    for (const msg of msgs) {
      appendChatMsg(chatDetailContainer, msg);
    }

    chatDetailSub.textContent = `${msgs.length} 条消息${chatHasMore ? '+' : ''}`;
    chatPanel.scrollTop = chatPanel.scrollHeight;
  } catch (e) {
    chatDetailContainer.innerHTML = `<div class="chat-error">网络错误: ${escHtml(e.message)}</div>`;
  }
}

function appendChatMsg(container, msg) {
  const bubble = document.createElement('div');
  bubble.className = `chat-bubble ${msg.role}`;
  const meta = document.createElement('div');
  meta.className = 'chat-meta';
  meta.textContent = `${msg.senderName} · ${formatDate(msg.time)}`;
  const body = document.createElement('div');
  body.className = 'chat-msg';
  body.textContent = msg.text;
  bubble.appendChild(meta);
  bubble.appendChild(body);
  container.appendChild(bubble);
}

async function loadMoreMessages() {
  if (!currentViewUser || !chatHasMore || !chatPageToken || chatLoadingMore) return;
  chatLoadingMore = true;
  const hint = document.getElementById('chatLoadMore');
  if (hint) { hint.textContent = '加载中...'; hint.className = 'chat-load-more loading'; }

  try {
    const isGroupMore = currentViewUser.startsWith('group:');
    const chatParamMore = isGroupMore ? `chatId=${encodeURIComponent(currentViewUser.replace('group:', ''))}` : `userId=${encodeURIComponent(currentViewUser)}`;
    const res = await fetch(`/api/chat-messages?token=${token}${botParam()}&${chatParamMore}&limit=50&page_token=${encodeURIComponent(chatPageToken)}`);
    const data = await res.json();
    if (!data.ok) { chatLoadingMore = false; return; }

    chatPageToken = data.page_token;
    chatHasMore = data.has_more;

    const msgs = data.messages || [];
    if (msgs.length === 0) { chatHasMore = false; }

    const oldScrollHeight = chatPanel.scrollHeight;
    const oldScrollTop = chatPanel.scrollTop;

    if (hint) hint.remove();

    const refNode = chatDetailContainer.firstChild;
    if (chatHasMore) {
      const newHint = document.createElement('div');
      newHint.className = 'chat-load-more';
      newHint.id = 'chatLoadMore';
      newHint.textContent = '↑ 上滑加载更早消息';
      chatDetailContainer.insertBefore(newHint, refNode);
    }

    const frag = document.createDocumentFragment();
    for (const msg of msgs) {
      const bubble = document.createElement('div');
      bubble.className = `chat-bubble ${msg.role}`;
      const meta = document.createElement('div');
      meta.className = 'chat-meta';
      meta.textContent = `${msg.senderName} · ${formatDate(msg.time)}`;
      const body = document.createElement('div');
      body.className = 'chat-msg';
      body.textContent = msg.text;
      bubble.appendChild(meta);
      bubble.appendChild(body);
      frag.appendChild(bubble);
    }

    const insertBefore = chatHasMore ? chatDetailContainer.children[1] : refNode;
    chatDetailContainer.insertBefore(frag, insertBefore);

    chatPanel.scrollTop = oldScrollTop + (chatPanel.scrollHeight - oldScrollHeight);

    const total = chatDetailContainer.querySelectorAll('.chat-bubble').length;
    chatDetailSub.textContent = `${total} 条消息${chatHasMore ? '+' : ''}`;
  } catch {}
  chatLoadingMore = false;
}

// --- WebSocket ---
function connectWs() {
  if (ws) { ws.close(); ws = null; }
  ws = new WebSocket(wsUrl());
  ws.onopen = () => {
    statusDot.classList.add('connected');
    statusText.textContent = 'connected';
  };
  ws.onclose = () => {
    statusDot.classList.remove('connected');
    statusText.textContent = 'reconnecting...';
    setTimeout(connectWs, 3000);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = (e) => {
    if (paused) return;
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'log') handleLog(msg.data);
    } catch {}
  };
}

function handleLog(data) {
  appendLogLine(data);
  processTask(data);
  processRealtimeChat(data);
}

function processRealtimeChat(data) {
  if (data.type === 'message_content') {
    const m = data.message.match(/DM from (\S+): ([\s\S]+)/);
    if (m) {
      const userId = m[1];
      const name = displayName(userId);
      const u = ensureUserSummary(userId, name);
      u.lastText = m[2];
      u.lastTime = data.time;
      u.msgCount++;
      currentRealtimeUser = userId;
      if (!currentViewUser) renderUserList();
    }
  } else if (data.type === 'group_message_content') {
    const m = data.message.match(/message in group (\S+): ([\s\S]+)/);
    if (m) {
      const groupId = 'group:' + m[1];
      const groupName = groupNameCache[m[1]] || m[1].substring(0, 12);
      const u = ensureUserSummary(groupId, groupName);
      u.lastText = m[2];
      u.lastTime = data.time;
      u.msgCount++;
      currentRealtimeUser = groupId;
      if (!currentViewUser) renderUserList();
    }
  } else if (data.type === 'message_done') {
    if (currentRealtimeUser) {
      const u = ensureUserSummary(currentRealtimeUser);
      u.lastTime = data.time;
      if (!currentViewUser) renderUserList();
      currentRealtimeUser = null;
    }
  } else if (data.type === 'task_end') {
    if (currentRealtimeUser) {
      const u = ensureUserSummary(currentRealtimeUser);
      u.lastTime = data.time;
      if (!currentViewUser) renderUserList();
      currentRealtimeUser = null;
    }
  }
}

let logsLoaded = false;
let currentLogDate = '';

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

async function loadLogsForDate(date) {
  logsPanel.innerHTML = '<div style="text-align:center;padding:40px;color:#484f58">加载中...</div>';
  logLines = 0;
  currentLogDate = date;
  try {
    const res = await fetch(`/api/logs?token=${token}${botParam()}&date=${date}&lines=5000`);
    const data = await res.json();
    logsPanel.innerHTML = '';
    if (!data.ok) {
      logsPanel.innerHTML = `<div style="text-align:center;padding:40px;color:#f85149">加载失败: ${data.error || ''}</div>`;
      return;
    }
    const info = document.getElementById('logInfo');
    if (data.total === 0) {
      logsPanel.innerHTML = '<div style="text-align:center;padding:40px;color:#484f58">该日期无日志</div>';
      info.textContent = `${date} · 0 条`;
      logCount.textContent = '0';
      return;
    }
    for (const log of data.logs) {
      appendLogLine(log, true);
    }
    info.textContent = `${date} · 显示 ${data.showing}/${data.total} 条`;
    if (autoScroll.checked) logsPanel.scrollTop = logsPanel.scrollHeight;
  } catch (e) {
    logsPanel.innerHTML = `<div style="text-align:center;padding:40px;color:#f85149">网络错误</div>`;
  }
}

function appendLogLine(data, skipScroll) {
  const div = document.createElement('div');
  div.className = `log-line type-${data.type}`;
  const timeStr = formatTime(data.time);
  const sub = data.subsystem ? `[${data.subsystem}]` : '';
  const cn = logCnAnnotation(data.message, data.subsystem);
  div.innerHTML = `<span class="log-time">${timeStr}</span><span class="log-sub">${escHtml(sub)}</span><span class="log-msg">${escHtml(data.message)}</span>${cn ? '<span class="log-cn">// ' + escHtml(cn) + '</span>' : ''}`;
  const filter = searchInput.value.toLowerCase();
  if (filter && !data.message.toLowerCase().includes(filter) && !data.subsystem.toLowerCase().includes(filter)) {
    div.classList.add('filtered');
  }
  logsPanel.appendChild(div);
  logLines++;
  logCount.textContent = logLines;
  while (logsPanel.children.length > MAX_LOG_LINES) { logsPanel.removeChild(logsPanel.firstChild); logLines--; }
  if (!skipScroll && autoScroll.checked) logsPanel.scrollTop = logsPanel.scrollHeight;
}

// --- Tasks ---
let lastTaskId = null;

function taskDedup(userId, text, time) {
  return `${userId}|${(text||'').substring(0,30)}|${(time||'').substring(0,19)}`;
}

function processTask(data) {
  if (data.type === 'message_content') {
    const m = data.message.match(/DM from (\S+): (.+)/);
    if (m) {
      const tid = taskDedup(m[1], m[2], data.time);
      if (tasks.has(tid)) return;
      tasks.set(tid, { userId: m[1], userName: displayName(m[1]), text: m[2], time: data.time, status: 'processing', error: null });
      lastTaskId = tid;
      renderTasks();
    }
  } else if (data.type === 'task_end') {
    const tid = lastTaskId || [...tasks.keys()].reverse().find(k => tasks.get(k).status === 'processing');
    if (tid && tasks.has(tid)) {
      const task = tasks.get(tid);
      if (data.message.includes('isError=true')) {
        task.status = 'failed';
        const errMatch = data.message.match(/error=(.+)/);
        task.error = errMatch ? errMatch[1] : 'unknown';
        if (task.error.includes('rate limit')) task.status = 'rate_limit';
      } else { task.status = 'success'; }
      tasks.set(tid, task);
      lastTaskId = null;
      renderTasks();
    }
  } else if (data.type === 'message_done') {
    if (lastTaskId && tasks.has(lastTaskId)) {
      const task = tasks.get(lastTaskId);
      if (task.status === 'processing') {
        const rm = data.message.match(/replies=(\d+)/);
        const replies = rm ? parseInt(rm[1]) : 0;
        task.status = replies > 0 ? 'success' : 'failed';
        tasks.set(lastTaskId, task);
        lastTaskId = null;
        renderTasks();
      }
    }
  }
}

function renderTasks() {
  const arr = [...tasks.values()].reverse().slice(0, 50);
  taskCount.textContent = arr.length;
  if (!arr.length) { tasksPanel.innerHTML = '<div class="empty-state">等待任务...</div>'; return; }
  tasksPanel.innerHTML = arr.map(t => `
    <div class="task-card">
      <div class="task-header">
        <span class="task-user">${escHtml(t.userName || t.userId.substring(0, 12))}</span>
        <span class="task-time">${formatDate(t.time)}</span>
      </div>
      <div class="task-message">${escHtml(t.text)}</div>
      <span class="task-status ${t.status}">${({processing:'处理中...',success:'完成',failed:'失败',rate_limit:'限流'})[t.status]||t.status}</span>
      ${t.error ? `<span style="color:#8b949e;font-size:12px;margin-left:8px">${escHtml(t.error.substring(0,80))}</span>` : ''}
    </div>`).join('');
}

// --- Utils ---
function formatTime(t) {
  if (!t) return '';
  try { return new Date(t).toLocaleTimeString('zh-CN', { hour12: false }); }
  catch { return ''; }
}

function formatDate(t) {
  if (!t) return '';
  try {
    const d = new Date(t);
    const now = new Date();
    if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString('zh-CN', { hour12: false });
    return `${d.getMonth()+1}/${d.getDate()} ${d.toLocaleTimeString('zh-CN', { hour12: false })}`;
  } catch { return ''; }
}

function toCN(isoStr) {
  if (!isoStr) return '';
  try {
    const d = new Date(isoStr);
    if (isNaN(d.getTime())) return isoStr;
    return d.toLocaleString('sv-SE', { timeZone: 'Asia/Shanghai' }).replace(' ', ' ');
  } catch { return isoStr; }
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let tokensLoaded = false;
let tokenData = null;

async function loadTokenUsage() {
  const panel = document.getElementById('tokensPanel');
  panel.innerHTML = '<div class="token-loading">正在加载 Token 用量数据...</div>';
  try {
    let data = window._tokenCache || null;

  } catch (e) {
    panel.innerHTML = `<div class="token-loading" style="color:#f85149">网络错误: ${escHtml(e.message)}</div>`;
  }

function formatTokenNum(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

function renderTokenUsage(data) {
  const panel = document.getElementById('tokensPanel');
  const daily = data.daily || [];
  const totals = data.totals || {};
  const interactions = data.interactions || [];

  // Total stats
  const totalTokens = totals.totalTokens || daily.reduce((s, d) => s + (d.totalTokens || 0), 0);
  const totalInput = totals.input || daily.reduce((s, d) => s + (d.input || 0), 0);
  const totalOutput = totals.output || daily.reduce((s, d) => s + (d.output || 0), 0);
  const totalCache = interactions.reduce((s, i) => s + (i.cacheRead || 0), 0);
  const totalCost = totals.totalCost || 0;
  const totalDays = daily.length;

  let html = '';

  // Overview cards
  html += '<div class="token-overview">';
  html += `<div class="token-stat-card highlight"><div class="token-stat-value">${formatTokenNum(totalTokens)}</div><div class="token-stat-label">总 Tokens (${totalDays}天)</div></div>`;
  html += `<div class="token-stat-card"><div class="token-stat-value">${formatTokenNum(totalInput)}</div><div class="token-stat-label">输入 Tokens</div></div>`;
  html += `<div class="token-stat-card"><div class="token-stat-value" style="color:#da8ee7">${formatTokenNum(totalCache)}</div><div class="token-stat-label">缓存命中 Tokens</div></div>`;
  html += `<div class="token-stat-card"><div class="token-stat-value">${formatTokenNum(totalOutput)}</div><div class="token-stat-label">输出 Tokens</div></div>`;
  const calcCost = totals.calculatedCost || totalCost;
  html += `<div class="token-stat-card"><div class="token-stat-value">${calcCost > 0 ? '$' + calcCost.toFixed(2) : '—'}</div><div class="token-stat-label">总费用 (USD)</div></div>`;
  html += `<div class="token-stat-card"><div class="token-stat-value">${interactions.length}</div><div class="token-stat-label">总交互次数</div></div>`;
  html += '</div>';

  // Daily bar chart
  if (daily.length > 0) {
    const maxTokens = Math.max(...daily.map(d => (d.input || 0) + (d.output || 0)), 1);
    html += '<div class="token-chart">';
    html += '<div class="token-chart-title">每日 Token 用量</div>';
    html += '<div class="token-legend"><div class="token-legend-item"><div class="token-legend-dot" style="background:#58a6ff"></div>输入</div><div class="token-legend-item"><div class="token-legend-dot" style="background:#3fb950"></div>输出</div></div>';
    html += '<div class="token-bars">';
    for (const d of daily) {
      const inp = d.input || 0;
      const out = d.output || 0;
      const total = d.totalTokens || 0;
      const hInput = Math.max(((inp) / maxTokens) * 130, 2);
      const hOutput = Math.max(((out) / maxTokens) * 130, 2);
      const dateLabel = (d.date || '').substring(5);
      const costStr = d.totalCost > 0 ? ' $' + d.totalCost.toFixed(3) : '';
      html += `<div class="token-bar-group">`;
      html += `<div class="token-bar-tooltip">${d.date}<br>输入: ${formatTokenNum(inp)} · 输出: ${formatTokenNum(out)}<br>总计: ${formatTokenNum(total)}${costStr}</div>`;
      html += `<div class="token-bar output" style="height:${hOutput}px" title="输出: ${formatTokenNum(out)}"></div>`;
      html += `<div class="token-bar input" style="height:${hInput}px" title="输入: ${formatTokenNum(inp)}"></div>`;
      html += `<span class="token-bar-date">${dateLabel}</span>`;
      html += `</div>`;
    }
    html += '</div></div>';
  }

  // Cron task section (loaded async)
  html += '<div class="task-group-section" id="cronSection"><div class="token-loading" style="padding:20px;font-size:13px">加载定时任务...</div></div>';

  // Filter toolbar
  html += '<div class="token-toolbar">';
  html += '<label>筛选用户:</label><select id="tokenUserFilter"><option value="">全部</option></select>';
  html += '<label style="margin-left:12px">筛选日期:</label><input type="date" id="tokenDateFilter" style="width:140px">';
  html += '<span style="flex:1"></span>';
  html += '<span id="tokenFilterInfo" style="font-size:12px;color:#484f58"></span>';
  html += '</div>';

  // Detail table
  html += '<div class="token-detail">';
  html += '<div class="token-detail-title">指令明细</div>';
  html += '<table class="token-table"><thead><tr>';
  html += '<th>时间</th><th>用户</th><th>指令内容</th><th>模型</th><th style="text-align:right">输入</th><th style="text-align:right">缓存</th><th style="text-align:right">输出</th><th style="text-align:right">总计</th><th style="text-align:right">费用</th>';
  html += '</tr></thead><tbody id="tokenTableBody"></tbody></table>';
  html += '</div>';

  panel.innerHTML = html;

  // Populate user filter
  const users = [...new Set(interactions.map(i => i.user))].sort();
  const userSelect = document.getElementById('tokenUserFilter');
  for (const u of users) {
    const opt = document.createElement('option');
    opt.value = u;
    opt.textContent = u;
    userSelect.appendChild(opt);
  }

  renderTokenTable(interactions);
  loadCronUsage();

  userSelect.addEventListener('change', () => applyTokenFilter(interactions));
  document.getElementById('tokenDateFilter').addEventListener('change', () => applyTokenFilter(interactions));
}

function applyTokenFilter(interactions) {
  const userFilter = document.getElementById('tokenUserFilter').value;
  const dateFilter = document.getElementById('tokenDateFilter').value;
  let filtered = interactions;
  if (userFilter) filtered = filtered.filter(i => i.user === userFilter);
  if (dateFilter) filtered = filtered.filter(i => (i.date || '').startsWith(dateFilter));
  renderTokenTable(filtered);
  const info = document.getElementById('tokenFilterInfo');
  const totalFiltered = filtered.reduce((s, i) => s + (i.totalTokens || 0), 0);
  info.textContent = `${filtered.length} 条记录 · ${formatTokenNum(totalFiltered)} tokens`;
}

  }
  const info = document.getElementById('tokenFilterInfo');
  if (info) {
    const totalFiltered = items.reduce((s, i) => s + (i.totalTokens || 0), 0);
    info.textContent = `${items.length} 条记录 · ${formatTokenNum(totalFiltered)} tokens`;
  }
}

    let h = '<div class="task-group-title">定时任务 <span class="tg-badge">' + jobs.length + ' 个</span></div>';
    for (let gi = 0; gi < jobs.length; gi++) {
      const j = jobs[gi];

      const statusText = j.enabled ? '运行中' : '已停止';
      h += '<div class="task-group-card">';
      h += '<div class="task-group-header" onclick="toggleTaskGroup(' + gi + ')">';
      h += '<span class="tg-expand" id="tgArrow' + gi + '">▶</span>';
      h += '<span class="tg-msg" title="' + escHtml(j.message || j.description || j.name) + '">';
      h += statusDot + ' ' + escHtml(j.name || j.description || j.message.substring(0, 40) || j.id);
      h += '</span>';
      h += '<span class="tg-user" style="color:#58a6ff">' + escHtml(j.schedule) + '</span>';
      h += '<div class="tg-stats">';
      h += '<div class="tg-stat"><div class="tg-stat-val">' + j.runCount + '</div><div class="tg-stat-label">执行次数</div></div>';
      h += '<div class="tg-stat"><div class="tg-stat-val">' + formatTokenNum(j.totalTokens) + '</div><div class="tg-stat-label">总tokens</div></div>';
      h += '<div class="tg-stat"><div class="tg-stat-val">' + (j.totalCost > 0 ? '$' + j.totalCost.toFixed(3) : '—') + '</div><div class="tg-stat-label">总费用</div></div>';
      h += '</div></div>';

      // Runs detail
      h += '<div class="tg-runs" id="tgRuns' + gi + '">';
      if (j.message) {
        h += '<div class="tg-avg" style="border-bottom:1px solid #21262d">指令: <span>' + escHtml(j.message) + '</span></div>';
      }
      if (j.runCount > 0) {
        const avgTokens = Math.round(j.totalTokens / j.runCount);
        const avgCost = j.totalCost / j.runCount;
        h += '<div class="tg-avg">平均每次: <span>' + formatTokenNum(avgTokens) + ' tokens</span>' + (avgCost > 0 ? ' · <span>$' + avgCost.toFixed(4) + '</span>' : '') + '</div>';
        h += '<table class="tg-run-table"><thead><tr><th>#</th><th>执行时间</th><th>状态</th><th style="text-align:right">输入</th><th style="text-align:right">输出</th><th style="text-align:right">总计</th><th style="text-align:right">费用</th></tr></thead><tbody>';
        const runs = j.runs || [];
        for (let ri = 0; ri < runs.length; ri++) {
          const r = runs[ri];
          const timeStr = toCN(r.startedAt);
          const st = r.status || '?';
          const stColor = st === 'ok' || st === 'success' || st === 'completed' ? '#3fb950' : st === 'error' || st === 'failed' ? '#f85149' : '#d29922';
          h += '<tr><td>' + (ri + 1) + '</td><td>' + escHtml(timeStr) + '</td>';
          h += '<td style="color:' + stColor + '">' + escHtml(st) + '</td>';
          h += '<td class="num">' + formatTokenNum(r.inputTokens) + '</td>';
          h += '<td class="num">' + formatTokenNum(r.outputTokens) + '</td>';
          h += '<td class="num">' + formatTokenNum(r.totalTokens) + '</td>';
          h += '<td class="num" style="color:#3fb950">' + (r.cost > 0 ? '$' + r.cost.toFixed(4) : '—') + '</td></tr>';
        }
        h += '</tbody></table>';
      } else {
        h += '<div class="tg-avg">尚未执行过</div>';
      }
      if (j.nextRunAt) {
        h += '<div class="tg-avg">下次执行: <span>' + escHtml(toCN(j.nextRunAt)) + '</span></div>';
      }
      h += '</div></div>';
    }
    section.innerHTML = h;
  } catch (e) {
    section.innerHTML = '';
  }
}

function toggleTaskGroup(gi) {
  const runs = document.getElementById('tgRuns' + gi);
  const arrow = document.getElementById('tgArrow' + gi);
  if (!runs) return;
  const isOpen = runs.classList.contains('open');
  runs.classList.toggle('open');
  arrow.classList.toggle('open');
}


  // --- Custom tooltip for msg-cell ---
  (function() {
    const tip = document.createElement('div');
    tip.className = 'msg-tooltip';
    document.body.appendChild(tip);
    let showTimer = null;
    document.addEventListener('mouseover', function(e) {
      const cell = e.target.closest('[data-tip-idx]');
      if (!cell) return;
      const idx = parseInt(cell.dataset.tipIdx);
      const msgs = window._tipMessages;
      if (!msgs || isNaN(idx) || !msgs[idx]) return;
      clearTimeout(showTimer);
      showTimer = setTimeout(function() {
        tip.textContent = msgs[idx];
        tip.style.display = 'block';
        const rect = cell.getBoundingClientRect();
        let top = rect.bottom + 6;
        let left = rect.left;
        tip.classList.add('visible');
        requestAnimationFrame(function() {
          const tw = tip.offsetWidth;
          const th = tip.offsetHeight;
          if (left + tw > window.innerWidth - 12) left = window.innerWidth - tw - 12;
          if (left < 8) left = 8;
          if (top + th > window.innerHeight - 12) top = rect.top - th - 6;
          tip.style.left = left + 'px';
          tip.style.top = top + 'px';
        });
      }, 100);
    });
    document.addEventListener('mouseout', function(e) {
      const cell = e.target.closest('[data-tip-idx]');
      if (!cell) return;
      clearTimeout(showTimer);
      tip.classList.remove('visible');
      setTimeout(function() { if (!tip.classList.contains('visible')) tip.style.display = 'none'; }, 200);
    });
  })();
</script>
